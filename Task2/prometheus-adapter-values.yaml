prometheus:
  url: http://monitoring-kube-prometheus-prometheus.monitoring.svc

rules:
  default: false
  custom:
    - seriesQuery: 'http_requests_total{namespace!="",pod!=""}'
      resources:
        overrides:
          namespace:
            resource: namespace
          pod:
            resource: pod
      name:
        # имя метрики, под которым она появится в Custom Metrics API
        matches: "^(.*)_total"
        as: "${1}_per_second"
      metricsQuery: 'sum(rate(<<.Series>>[1m])) by (<<.GroupBy>>)'

# чтобы HPA мог читать кастомные метрики
aggregatedDiscovery:
  enable: true
