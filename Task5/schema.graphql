schema {
  query: Query
}

"""Корневой тип запросов ко всем клиентским данным."""
type Query {
  """
  Получить информацию о клиенте по его идентификатору.
  Аналог: GET /clients/{id}
  """
  client(id: ID!): Client
}

"""Клиент страхового сервиса."""
type Client {
  """Уникальный идентификатор клиента."""
  id: ID!

  """Имя/ФИО клиента."""
  name: String

  """Возраст клиента."""
  age: Int

  """
  Список документов клиента.
  Аналог: GET /clients/{id}/documents
  """
  documents: [Document!]!

  """
  Список родственников клиента.
  Аналог: GET /clients/{id}/relatives
  """
  relatives: [Relative!]!
}

"""Документ клиента (паспорт, ВУ и т.п.)."""
type Document {
  """Идентификатор документа."""
  id: ID!

  """Тип документа (паспорт, водительское удостоверение и т. д.)."""
  type: String

  """Номер документа."""
  number: String

  """Дата выдачи документа."""
  issueDate: String

  """Дата истечения срока действия документа."""
  expiryDate: String
}

"""Родственник клиента."""
type Relative {
  """Идентификатор родственника."""
  id: ID!

  """Тип родственной связи (мать, отец, супруг и т.п.)."""
  relationType: String

  """Имя/ФИО родственника."""
  name: String

  """Возраст родственника."""
  age: Int
}
